name: Release
# Purpose:
#   - Analyze conventional commits since last tag
#   - Decide next semantic version (or fallback for first release)
#   - Update VERSION file, commit it, push git tag + create GitHub Release
#
# After this workflow creates a tag (vX.Y.Z):
#   - The "Publish Docker Image" workflow is triggered automatically
#   - See: .github/workflows/publish-image.yml

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    # Safety: only run when on main (workflow_dispatch from other branches will be skipped)
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true  # Ensure we can detect existing tags for version fallback

      # Calculate the next version without creating tag yet.
      # We will update VERSION file, commit it, then create the tag.
      - name: Determine next version
        id: version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Only bump on conventional commits (feat:, fix:, BREAKING:)
          default_bump: false
          release_branches: main
          tag_prefix: v
          dry_run: true

      # Resolve final version to release (with first-release fallback).
      # Logic lives in .github/actions/resolve-release-version
      - name: Resolve release version
        id: release-version
        uses: ./.github/actions/resolve-release-version
        with:
          new-version: ${{ steps.version.outputs.new_version }}
          new-tag: ${{ steps.version.outputs.new_tag }}

      # Update the VERSION file at root when we have a new release version
      - name: Update VERSION file
        if: steps.release-version.outputs.new_version != ''
        run: |
          echo "${{ steps.release-version.outputs.new_version }}" > VERSION
          echo "VERSION file updated to: $(cat VERSION)"

      # Commit the VERSION file and create + push the git tag
      # This ensures the tagged commit contains the correct VERSION
      - name: Commit VERSION and create tag
        if: steps.release-version.outputs.new_version != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add VERSION

          # Commit only if there are actual changes.
          # On first release (no tags), resolve-release-version may return the current VERSION value
          # (e.g. 1.0.0), so writing it produces no diff → would cause "nothing to commit" + exit 1.
          if git diff --cached --quiet; then
            echo "No changes to VERSION file to commit."
          else
            git commit -m "chore(release): bump VERSION to ${{ steps.release-version.outputs.new_version }}"
            git push origin HEAD:main
          fi

          # Create and push tag if it does not exist yet (required for first release)
          if git rev-parse --verify refs/tags/${{ steps.release-version.outputs.new_tag }} >/dev/null 2>&1; then
            echo "Tag ${{ steps.release-version.outputs.new_tag }} already exists."
          else
            git tag ${{ steps.release-version.outputs.new_tag }}
            git push origin ${{ steps.release-version.outputs.new_tag }}
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: steps.release-version.outputs.new_tag != ''
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ steps.release-version.outputs.new_tag }}
          name: Release ${{ steps.release-version.outputs.new_tag }}
          generate_release_notes: true
          draft: false
          prerelease: false

      - name: Summary
        run: |
          if [ "${{ steps.release-version.outputs.new_tag }}" != "" ]; then
            echo "🚀 New GitHub Release created: ${{ steps.release-version.outputs.new_tag }}"
            echo "📄 VERSION file updated to: $(cat VERSION 2>/dev/null || echo 'N/A')"
            echo "🏷️  Git tag pushed: ${{ steps.release-version.outputs.new_tag }}"
            echo "   → Docker image publish will be triggered by the tag (see publish-image workflow)"
          else
            echo "ℹ️ No new version tag created (no conventional commits warranting bump or first run with existing tags)"
          fi
