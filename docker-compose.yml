services:
  hutech-bot:
    build:
      context: .
    image: ghcr.io/Tylerx404/e-hutech
    container_name: hutech-bot
    profiles: ["full", "no-db", "no-cache"]
    restart: unless-stopped
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - POSTGRES_URL=${POSTGRES_URL:-}
      - REDIS_URL=${REDIS_URL:-}
      - STORAGE_BACKEND=${STORAGE_BACKEND:-}
      - CACHE_BACKEND=${CACHE_BACKEND:-}
      - SQLITE_PATH=/data/bot.db
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_JSON=${LOG_JSON:-true}
      - TZ=Asia/Ho_Chi_Minh
    volumes:
      - data:/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    depends_on:
      postgres:
        condition: service_healthy
        required: false
      redis:
        condition: service_healthy
        required: false
    healthcheck:
      test: ["CMD", "python", "-c", "print('Health check passed')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  postgres:
    image: postgres
    container_name: hutech-postgres
    profiles: ["full", "no-cache"]
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: db_name
    volumes:
      - postgres_data:/var/lib/postgresql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d db_name"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis
    container_name: hutech-redis
    profiles: ["full", "no-db"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  data:
